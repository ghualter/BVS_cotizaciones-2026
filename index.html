const fmt = n => new Intl.NumberFormat("es-PE",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n);

const pct = (a,b) => b ? Math.round((a/b)*100) : 0;

  return (
    <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#1d4ed8 100%)"}} className="text-white px-5 py-5">
      <div className="max-w-7xl mx-auto">

        <div className="flex items-start justify-between mb-5">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <span style={{background:"#049fd9",borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:700,letterSpacing:1}}>BVS PERÚ</span>
              <span style={{background:"rgba(255,255,255,0.12)",borderRadius:6,padding:"2px 10px",fontSize:11,color:"#93c5fd"}}>Territorio I&C</span>

            <div className="font-bold text-white text-lg">{nClientes} clientes</div>
            <div>{nCots} cotizaciones</div>
          </div>
        </div>

        {/* KPI grid */}
        <div className="grid gap-3" style={{gridTemplateColumns:"repeat(5,1fr)"}}>
          {[
            {label:"Pipeline total", value:fmt(totalPipeline), sub:"todas las cotizaciones", color:"#fff"},
            {label:"Logrado YTD", value:fmt(logrado), sub:`${avance}% de cuota $3M`, color:"#86efac"},
            {label:"Por confirmar", value:fmt(porConf), sub:"oportunidades abiertas", color:"#fde68a"},
            {label:"Pipeline Cisco", value:fmt(ciscoMonto), sub:`${ciscoShare}% del total · meta 80%`, color: ciscoShare >= 50 ? "#86efac" : "#fca5a5"},

/* ─── CLIENT CARD ─────────────────────────────────────────────────────────── */
function ClientCard({ cliente, cots, onClick, selected }) {
  const log = cots.filter(c=>c.estado==="Lograda");
  const pip = cots.filter(c=>c.estado==="Por confirmar");
  const per = cots.filter(c=>c.estado==="Perdido");
  const total = cots.reduce((s,c)=>s+c.monto,0);
  const logrado = log.reduce((s,c)=>s+c.monto,0);
  const seg = cots[0]?.segmento||"";
  const bvs = cots[0]?.segmento_bvs||"";
  const enT = cots.some(c=>c.en_territorio==="Si");
  const ciscoMonto = cots.filter(c=>isCisco(c.referencia)).reduce((s,c)=>s+c.monto,0);
  const ciscoShare = total > 0 ? pct(ciscoMonto, total) : 0;
  const opp = CISCO_OPPS[cots[0]?.cuenta];
  const ini = cliente.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase();
  const ss = SEG_STYLE[seg] || SEG_STYLE["Externo"];
  const isSelected = selected === cliente;

  return (
    <div onClick={()=>onClick(cliente)}
      style={{borderRadius:16,border:`2px solid ${isSelected?"#2563eb":"#e2e8f0"}`,background:isSelected?"#eff6ff":"#fff",cursor:"pointer",padding:16,transition:"all 0.18s"}}
      className="card-hover fade-in">
      <div className="flex items-start gap-3 mb-3">
        <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#1e40af,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0}}>
          {ini}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,color:"#0f172a",fontSize:13,lineHeight:1.3}}>{cliente}</div>
          <div className="flex items-center gap-1 mt-1 flex-wrap">
            <span className="badge" style={{background:ss.bg,color:ss.text}}>{seg}</span>
            <span className="badge" style={{background:enT?"#d1fae5":"#f1f5f9",color:enT?"#065f46":"#64748b"}}>{enT?"Territorio":"Externo"}</span>
            {bvs && bvs!=="Fuera Territorio" && <span className="badge" style={{background:"#f5f3ff",color:"#7c3aed"}}>{bvs}</span>}
          </div>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-1.5 mb-3">
        {[["✓",log.length,"#dcfce7","#166534"],["⏳",pip.length,"#fef9c3","#854d0e"],["✕",per.length,"#fee2e2","#991b1b"]].map(([ic,v,bg,tc])=>(
          <div key={ic} style={{background:bg,borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
            <div style={{fontSize:10,color:tc,opacity:0.7}}>{ic}</div>
            <div style={{fontSize:14,fontWeight:700,color:tc}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{borderTop:"1px solid #f1f5f9",paddingTop:10}}>
        <div className="flex justify-between items-center">
          <span style={{fontSize:11,color:"#94a3b8"}}>{cots.length} cotiz.</span>
          <span style={{fontSize:14,fontWeight:700,color:"#0f172a"}}>{fmt(total)}</span>
        </div>
        {logrado>0 && (
          <div className="mt-2">
            <div className="flex justify-between" style={{fontSize:11,color:"#64748b",marginBottom:3}}>
              <span>Logrado</span><span style={{color:"#16a34a",fontWeight:600}}>{fmt(logrado)}</span>
            </div>
            <div style={{height:4,background:"#f1f5f9",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,width:`${Math.min(100,pct(logrado,total))}%`,background:"linear-gradient(90deg,#4ade80,#16a34a)"}}/>
            </div>
          </div>
        )}
        {ciscoShare > 0 && (
          <div className="mt-1.5 flex items-center gap-1.5">
            <span style={{fontSize:10,color:"#0369a1"}}>🔵 Cisco</span>
            <div style={{flex:1,height:3,background:"#e0f2fe",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(100,ciscoShare)}%`,background:"#0ea5e9",borderRadius:99}}/>
            </div>
            <span style={{fontSize:10,fontWeight:600,color:"#0369a1"}}>{ciscoShare}%</span>
          </div>
        )}
        {opp && <div style={{marginTop:6,fontSize:10,color:"#7c3aed",fontWeight:600}}>⚡ Opp. Cisco: {opp.prio}</div>}
      </div>
    </div>
  );
}

      </div>
      <div className="grid gap-4" style={{gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))"}}>
        {Object.entries(CISCO_OPPS).map(([cuenta,opp])=>{
          const ps = PRIO_STYLE[opp.prio] || PRIO_STYLE["Media"];
          return (
            <div key={cuenta} style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",overflow:"hidden"}} className="panel-shadow fade-in">
              <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a8a)",padding:"12px 16px"}}>
                <div style={{fontWeight:700,color:"#fff",fontSize:14}}>{cuenta}</div>
                <span className="badge mt-1" style={{background:ps.bg,color:ps.text}}>{ps.icon} Prioridad {opp.prio}</span>
              </div>
              <div style={{padding:"12px 16px"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Soluciones recomendadas</div>
                <div className="flex flex-wrap gap-1.5 mb-3">
                  {opp.sols.map(s=><span key={s} className="badge cisco-pill">{s}</span>)}
                </div>
                <div style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#374151",borderLeft:"3px solid #2563eb"}}>
                  <strong style={{color:"#1e40af"}}>Próxima acción:</strong> {opp.accion}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── KPIS TAB ────────────────────────────────────────────────────────────── */
function KpisTab({ logrado, porConf, perdido, totalPipeline, ciscoMonto }) {
  const terrData = DATA.filter(d=>d.en_territorio==="Si");
  const byQ = ["Q1","Q2","Q3","Q4"].map(q=>({
    q, cuota:CUOTA_Q[q],
    logrado: DATA.filter(d=>d.q_cierre===q && d.estado==="Lograda").reduce((s,c)=>s+c.monto,0)
  }));
  const segMap = {};
  DATA.filter(d=>d.en_territorio==="Si").forEach(d=>{
    const s = d.segmento||"Otro";
    if(!segMap[s]) segMap[s]={total:0,log:0,n:0};
    segMap[s].total += d.monto; segMap[s].n++;
    if(d.estado==="Lograda") segMap[s].log += d.monto;
  });
  const maxSeg = Math.max(...Object.values(segMap).map(s=>s.total));

  return (
    <div className="fade-in grid gap-5" style={{gridTemplateColumns:"1fr 1fr"}}>
      {/* Cuota por trimestre */}
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",padding:20}} className="panel-shadow">
        <div style={{fontWeight:700,color:"#0f172a",marginBottom:16,fontSize:14}}>📅 Cuota por Trimestre 2026</div>
        {byQ.map(({q,cuota,logrado:lg})=>{
          const p = pct(lg,cuota);
          const ok = p>=70;
          return (
            <div key={q} className="mb-4">
              <div className="flex justify-between mb-1" style={{fontSize:13}}>
                <span style={{fontWeight:600,color:"#1e293b"}}>{q}</span>
                <span style={{color:"#64748b"}}>{fmt(lg)} <span style={{color:"#94a3b8"}}>/ {fmt(cuota)}</span></span>
                <span style={{fontWeight:700,color:ok?"#16a34a":lg>0?"#dc2626":"#94a3b8"}}>{p}%</span>
              </div>
              <div style={{height:8,background:"#f1f5f9",borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(100,p)}%`,borderRadius:99,
                  background:ok?"linear-gradient(90deg,#4ade80,#16a34a)":lg>0?"linear-gradient(90deg,#fca5a5,#ef4444)":"#e2e8f0",
                  transition:"width 0.6s ease"}}/>
              </div>
              {!ok && lg>0 && <div style={{fontSize:10,color:"#dc2626",marginTop:2}}>⚠️ Below Target — meta &gt;70%</div>}
            </div>
          );
        })}
      </div>

      {/* Pipeline por estado */}
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",padding:20}} className="panel-shadow">
        <div style={{fontWeight:700,color:"#0f172a",marginBottom:16,fontSize:14}}>💰 Distribución del Pipeline</div>
        {[["Logrado",logrado,"#16a34a","#dcfce7"],["Por confirmar",porConf,"#d97706","#fef9c3"],["Perdido",perdido,"#dc2626","#fee2e2"],["Se actualizó / En curso",totalPipeline-logrado-porConf-perdido,"#2563eb","#dbeafe"]].map(([lbl,v,tc,bg])=>{
          const p = pct(v,totalPipeline);
          return v>0?(
            <div key={lbl} className="mb-3">
              <div className="flex justify-between mb-1" style={{fontSize:12}}>
                <span style={{color:"#374151"}}>{lbl}</span>
                <span style={{fontWeight:700,color:tc}}>{fmt(v)} <span style={{color:"#94a3b8",fontWeight:400}}>({p}%)</span></span>
              </div>
              <div style={{height:6,background:"#f1f5f9",borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${p}%`,borderRadius:99,background:tc}}/>
              </div>
            </div>
          ):null;
        })}
        <div style={{marginTop:16,padding:"10px 12px",background:"#eff6ff",borderRadius:8,fontSize:12}}>
          <div style={{color:"#1e40af",fontWeight:600,marginBottom:4}}>🔵 Cisco en pipeline</div>
          <div className="flex justify-between">
            <span style={{color:"#374151"}}>{fmt(ciscoMonto)}</span>
            <span style={{fontWeight:700,color:pct(ciscoMonto,totalPipeline)>=80?"#16a34a":"#dc2626"}}>{pct(ciscoMonto,totalPipeline)}% <span style={{color:"#94a3b8",fontWeight:400}}>(meta 80%)</span></span>
          </div>
          <div style={{height:6,background:"#e0f2fe",borderRadius:99,overflow:"hidden",marginTop:6}}>
            <div style={{height:"100%",width:`${Math.min(100,pct(ciscoMonto,totalPipeline))}%`,borderRadius:99,background:"#0ea5e9"}}/>
          </div>
        </div>
      </div>

      {/* Pipeline por segmento */}
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",padding:20,gridColumn:"1/-1"}} className="panel-shadow">
        <div style={{fontWeight:700,color:"#0f172a",marginBottom:16,fontSize:14}}>📊 Pipeline por Segmento (territorio)</div>
        <div className="grid gap-3" style={{gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))"}}>
          {Object.entries(segMap).sort((a,b)=>b[1].total-a[1].total).map(([seg,d])=>{
            const ss = SEG_STYLE[seg]||SEG_STYLE["Externo"];
            const lp = pct(d.total,maxSeg);
            return (
              <div key={seg} style={{background:"#f8fafc",borderRadius:10,padding:"12px 14px",border:"1px solid #e2e8f0"}}>
                <div className="flex justify-between items-center mb-2">
                  <span className="badge" style={{background:ss.bg,color:ss.text}}>{seg}</span>
                  <span style={{fontSize:11,color:"#94a3b8"}}>{d.n} cotiz.</span>
                </div>
                <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>{fmt(d.total)}</div>
                {d.log>0&&<div style={{fontSize:11,color:"#16a34a",marginTop:2}}>✓ {fmt(d.log)} logrado</div>}
                <div style={{marginTop:8,height:4,background:"#e2e8f0",borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${lp}%`,borderRadius:99,background:ss.text}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─── APP ─────────────────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState("cotizaciones");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [fEstado, setFEstado] = useState("Todos");
  const [fTerr, setFTerr] = useState("Todos");
  const [fMes, setFMes] = useState("Todos");
  const [sort, setSort] = useState("monto");

  // expose tab setter for header buttons
  window.__setTab = (t) => {
    setTab(t);
    document.querySelectorAll("[id^=tab-]").forEach(el => {
      el.className = el.id === `tab-${t}` ? "tab-active" : "tab-inactive";
      el.style.borderRadius="8px"; el.style.padding="6px 16px"; el.style.fontSize="13px"; el.style.fontWeight="600"; el.style.border="none"; el.style.cursor="pointer"; el.style.transition="all 0.15s";
    });
  };

  const meses = useMemo(()=>["Todos",...Array.from(new Set(DATA.map(d=>d.mes).filter(Boolean)))],"");
  const clienteMap = useMemo(()=>{const m={};DATA.forEach(d=>{if(!m[d.cliente])m[d.cliente]=[];m[d.cliente].push(d);});return m;},[]);

  const totalPipeline = DATA.reduce((s,c)=>s+c.monto,0);
  const logrado = DATA.filter(c=>c.estado==="Lograda").reduce((s,c)=>s+c.monto,0);
  const porConf = DATA.filter(c=>c.estado==="Por confirmar").reduce((s,c)=>s+c.monto,0);
  const perdido = DATA.filter(c=>c.estado==="Perdido").reduce((s,c)=>s+c.monto,0);
  const ciscoMonto = DATA.filter(c=>isCisco(c.referencia)).reduce((s,c)=>s+c.monto,0);

  const filtered = useMemo(()=>Object.entries(clienteMap)
    .filter(([c])=>c.toLowerCase().includes(search.toLowerCase()))
    .filter(([,cs])=>{
      if(fEstado!=="Todos"&&!cs.some(c=>c.estado===fEstado))return false;
      if(fTerr==="Territorio"&&!cs.some(c=>c.en_territorio==="Si"))return false;
      if(fTerr==="Externo"&&!cs.some(c=>c.en_territorio==="No"))return false;
      if(fMes!=="Todos"&&!cs.some(c=>c.mes===fMes))return false;
      return true;
    })
    .sort((a,b)=>sort==="monto"?b[1].reduce((s,c)=>s+c.monto,0)-a[1].reduce((s,c)=>s+c.monto,0):sort==="nombre"?a[0].localeCompare(b[0]):b[1].length-a[1].length)
  ,[clienteMap,search,fEstado,fTerr,fMes,sort]);

  const selCots = useMemo(()=>{
    if(!selected)return[];
    let cs=clienteMap[selected]||[];
    if(fEstado!=="Todos")cs=cs.filter(c=>c.estado===fEstado);
    if(fMes!=="Todos")cs=cs.filter(c=>c.mes===fMes);
    return cs.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  },[selected,clienteMap,fEstado,fMes]);

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      <KpiBar logrado={logrado} porConf={porConf} totalPipeline={totalPipeline}
              ciscoMonto={ciscoMonto} nCots={DATA.length} nClientes={Object.keys(clienteMap).length}/>

      <div className="max-w-7xl mx-auto px-4 py-5">
        {tab==="cisco" && <CiscoTab/>}
        {tab==="kpis" && <KpisTab logrado={logrado} porConf={porConf} perdido={perdido} totalPipeline={totalPipeline} ciscoMonto={ciscoMonto}/>}

        {tab==="cotizaciones" && (
          <>
            {/* Filters */}
            <div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",padding:"12px 16px",marginBottom:16,display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}} className="panel-shadow">
              <input type="text" placeholder="🔍 Buscar cliente..." value={search} onChange={e=>setSearch(e.target.value)}
                style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 12px",fontSize:13,flex:1,minWidth:160,outline:"none"}}/>
              {[[fEstado,setFEstado,["Todos","Lograda","Por confirmar","Perdido","Se actualizó"]],
                [fTerr,setFTerr,["Todos","Territorio","Externo"]],
                [fMes,setFMes,meses]].map(([val,set,opts],i)=>(
                <select key={i} value={val} onChange={e=>set(e.target.value)}
                  style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,outline:"none",background:"#fff"}}>
                  {opts.map(o=><option key={o}>{o}</option>)}
                </select>
              ))}
              <select value={sort} onChange={e=>setSort(e.target.value)}
                style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,outline:"none",background:"#fff"}}>
                <option value="monto">Monto ↓</option>
                <option value="nombre">Nombre A–Z</option>
                <option value="cotizaciones"># Cotizaciones ↓</option>
              </select>
              {selected&&<button onClick={()=>setSelected(null)} style={{fontSize:12,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Limpiar</button>}
            </div>

            <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>{filtered.length} clientes encontrados</div>

            <div className="flex gap-5">
              {/* Client grid */}
              <div style={{flex:selected?"0 0 40%":"1",transition:"flex 0.3s ease"}}>
                <div className={`grid gap-3 ${selected?"":"sm:grid-cols-2 lg:grid-cols-3"}`} style={{gridTemplateColumns:selected?"1fr":undefined}}>
                  {filtered.map(([c,cs])=>(
                    <ClientCard key={c} cliente={c} cots={cs} onClick={setSelected} selected={selected}/>
                  ))}
                </div>
                {filtered.length===0&&<div style={{textAlign:"center",color:"#94a3b8",padding:48,fontSize:14}}>No se encontraron clientes</div>}
              </div>

              {/* Detail panel */}
              {selected&&(
                <div style={{flex:"0 0 58%",position:"sticky",top:16,alignSelf:"start"}} className="fade-in">
                  <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",overflow:"hidden"}} className="panel-shadow">
                    {/* Header */}
                    <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a8a)",padding:"16px 20px"}}>
                      <div className="flex items-center justify-between mb-2">
                        <div style={{fontWeight:700,color:"#fff",fontSize:17}}>{selected}</div>
                        <button onClick={()=>setSelected(null)} style={{color:"#93c5fd",background:"none",border:"none",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
                      </div>
                      <div className="flex gap-2 flex-wrap">
                        {(()=>{const cs=clienteMap[selected]||[];const seg=cs[0]?.segmento;const bvs=cs[0]?.segmento_bvs;const enT=cs.some(c=>c.en_territorio==="Si");
                        return[seg,bvs,enT?"En Territorio":"Fuera Territorio"].filter(Boolean).map(t=>(
                          <span key={t} className="badge" style={{background:"rgba(255,255,255,0.15)",color:"#e0f2fe"}}>{t}</span>
                        ));})()}
                        {CISCO_OPPS[clienteMap[selected]?.[0]?.cuenta] &&
                          <span className="badge" style={{background:"#0369a1",color:"#fff"}}>🔵 Opp. Cisco {CISCO_OPPS[clienteMap[selected][0].cuenta].prio}</span>}
                      </div>
                    </div>

                    {/* Stats row */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",borderBottom:"1px solid #f1f5f9"}}>
                      {(()=>{const all=clienteMap[selected]||[];
                      const log2=all.filter(c=>c.estado==="Lograda");
                      const pip2=all.filter(c=>c.estado==="Por confirmar");
                      const per2=all.filter(c=>c.estado==="Perdido");
                      return[["Total",fmt(all.reduce((s,c)=>s+c.monto,0)),"#0f172a"],
                             [`${log2.length} Logradas`,fmt(log2.reduce((s,c)=>s+c.monto,0)),"#16a34a"],
                             [`${pip2.length} Pipeline`,fmt(pip2.reduce((s,c)=>s+c.monto,0)),"#d97706"],
                             [`${per2.length} Perdidas`,fmt(per2.reduce((s,c)=>s+c.monto,0)),"#dc2626"]]
                      .map(([l,v,tc])=>(
                        <div key={l} style={{padding:"12px 10px",textAlign:"center",borderRight:"1px solid #f1f5f9"}}>
                          <div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{l}</div>
                          <div style={{fontSize:12,fontWeight:700,color:tc}}>{v}</div>
                        </div>
                      ));})()}
                    </div>

                    {/* Cisco opp block */}
                    {(()=>{const cuenta=clienteMap[selected]?.[0]?.cuenta;const opp=CISCO_OPPS[cuenta];
                    if(!opp)return null;
                    const ps=PRIO_STYLE[opp.prio]||PRIO_STYLE["Media"];
                    return(
                      <div style={{margin:"12px 16px",background:"#eff6ff",borderRadius:10,padding:"10px 14px",border:"1px solid #bfdbfe"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#1e40af",marginBottom:6}}>🔵 OPORTUNIDAD CISCO — Prioridad {opp.prio}</div>
                        <div className="flex flex-wrap gap-1 mb-2">{opp.sols.map(s=><span key={s} className="badge cisco-pill">{s}</span>)}</div>
                        <div style={{fontSize:11,color:"#374151"}}>⚡ <strong>Acción:</strong> {opp.accion}</div>
                      </div>
                    );})()}

                    {/* Cot list */}
                    <div style={{padding:"0 16px 16px",overflowY:"auto",maxHeight:400}}>
                      <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5,paddingTop:12}}>
                        Cotizaciones ({selCots.length})
                      </div>
                      <div className="flex flex-col gap-2">
                        {selCots.length===0
                          ?<div style={{textAlign:"center",color:"#94a3b8",padding:24,fontSize:13}}>Sin cotizaciones</div>
                          :selCots.map(c=><CotRow key={c.codigo} c={c}/>)}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
