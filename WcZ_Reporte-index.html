,{"codigo":"GC-COT-WC-061/0226","cliente":"BATA","referencia":"SERVICIO DE REMEDIACION WIRELESS SEDE MIRAFLORES","monto":2100.0,"fecha":"2026-02-27","antiguedad":6,"estado":"Por confirmar","en_territorio":"No","cuenta":"FUERA DE TERRITORIO","segmento":"Externo","segmento_bvs":"Fuera Territorio","q_cierre":"","mes":"Feb 2026"},{"codigo":"GC-COT-WC-062/0226","cliente":"GESNEXT","referencia":"RENOVACIÓN DE SWITCHES CISCO","monto":13890.0,"fecha":"2026-02-27","antiguedad":6,"estado":"Por confirmar","en_territorio":"No","cuenta":"FUERA DE TERRITORIO","segmento":"Externo","segmento_bvs":"Fuera Territorio","q_cierre":"","mes":"Feb 2026"},{"codigo":"GC-COT-WC-063/0226","cliente":"STATKRAFT","referencia":"SISTEMA DE CONFERENCIA CISCO","monto":19420.0,"fecha":"2026-02-27","antiguedad":6,"estado":"Por confirmar","en_territorio":"Si","cuenta":"STATKRAFT PERU S.A.","segmento":"Servicios","segmento_bvs":"Foco","q_cierre":"","mes":"Feb 2026"},{"codigo":"GC-COT-WC-064/0326","cliente":"LAP","referencia":"RENOVACIÓN DE GARANTÍA CISCO – 01 AÑO","monto":30970.0,"fecha":"2026-03-02","antiguedad":null,"estado":"Lograda","en_territorio":"Si","cuenta":"LAP","segmento":"Servicios","segmento_bvs":"Foco","q_cierre":"Q1","mes":"Mar 2026"},{"codigo":"GC-COT-WC-065/0326","cliente":"TOTAL ENERGIES","referencia":"EQUIPAMIENTO CISCO C9300L","monto":11569.0,"fecha":"2026-03-03","antiguedad":null,"estado":"Se actualizó","en_territorio":"No","cuenta":"FUERA DE TERRITORIO","segmento":"Externo","segmento_bvs":"Fuera Territorio","q_cierre":"","mes":"Mar 2026"},{"codigo":"GC-COT-WC-066/0326","cliente":"TOTAL ENERGIES","referencia":"EQUIPAMIENTO CISCO C9300L","monto":11369.0,"fecha":"2026-03-04","antiguedad":null,"estado":"Lograda","en_territorio":"No","cuenta":"FUERA DE TERRITORIO","segmento":"Externo","segmento_bvs":"Fuera Territorio","q_cierre":"Q1","mes":"Mar 2026"},{"codigo":"GC-COT-WC-067/0326","cliente":"SONY","referencia":"SWITCH CISCO C9300-24P-A","monto":11716.0,"fecha":"2026-03-05","antiguedad":null,"estado":"Lograda","en_territorio":"No","cuenta":"FUERA DE TERRITORIO","segmento":"Externo","segmento_bvs":"Fuera Territorio","q_cierre":"Q1","mes":"Mar 2026"},{"codigo":"GC-COT-WC-068/0326","cliente":"SONY","referencia":"EQUIPAMIENTO CÓMPUTO HP INC.","monto":8203.5,"fecha":"2026-03-05","antiguedad":null,"estado":"Lograda","en_territorio":"No","cuenta":"FUERA DE TERRITORIO","segmento":"Externo","segmento_bvs":"Fuera Territorio","q_cierre":"Q1","mes":"Mar 2026"}];

const { useState, useMemo } = React;

const ESTADO_CFG = {
  "Lograda":       { bg:"bg-green-100",  text:"text-green-800",  dot:"bg-green-500" },
  "Por confirmar": { bg:"bg-yellow-100", text:"text-yellow-800", dot:"bg-yellow-500" },
  "Perdido":       { bg:"bg-red-100",    text:"text-red-800",    dot:"bg-red-500" },
  "Se actualizó":  { bg:"bg-blue-100",   text:"text-blue-800",   dot:"bg-blue-400" },
};
const SEG_CLR = {
  "Industria":"bg-indigo-100 text-indigo-700","Servicios":"bg-purple-100 text-purple-700",
  "Comercio":"bg-orange-100 text-orange-700","Externo":"bg-gray-100 text-gray-600",
  "Media":"bg-pink-100 text-pink-700","Financiero":"bg-teal-100 text-teal-700",
};
const fmt = n => new Intl.NumberFormat("es-PE",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n);
const fmtD = d => d ? new Date(d+"T00:00:00").toLocaleDateString("es-PE",{day:"2-digit",month:"short",year:"numeric"}) : "-";

function ClientCard({ cliente, cots, onClick, selected }) {
  const log = cots.filter(c=>c.estado==="Lograda");
  const pip = cots.filter(c=>c.estado==="Por confirmar");
  const per = cots.filter(c=>c.estado==="Perdido");
  const total = cots.reduce((s,c)=>s+c.monto,0);
  const logrado = log.reduce((s,c)=>s+c.monto,0);
  const seg = cots[0]?.segmento||"";
  const bvs = cots[0]?.segmento_bvs||"";
  const enT = cots.some(c=>c.en_territorio==="Si");
  const ini = cliente.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
  return (
    <div onClick={()=>onClick(cliente)} className={`cursor-pointer rounded-2xl border-2 transition-all p-4 card-hover ${selected?"border-blue-500 bg-blue-50 shadow-lg":"border-gray-200 bg-white hover:border-blue-300"}`}>
      <div className="flex items-start gap-3 mb-3">
        <div className="w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style={{background:"linear-gradient(135deg,#1e40af,#3b82f6)"}}>{ini}</div>
        <div className="flex-1 min-w-0">
          <div className="font-bold text-gray-800 text-sm leading-tight truncate">{cliente}</div>
          <div className="flex items-center gap-1 mt-1 flex-wrap">
            <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${SEG_CLR[seg]||"bg-gray-100 text-gray-600"}`}>{seg}</span>
            <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${enT?"bg-emerald-100 text-emerald-700":"bg-gray-100 text-gray-500"}`}>{enT?"Territorio":"Externo"}</span>
            {bvs&&bvs!=="Fuera Territorio"&&<span className="text-xs px-2 py-0.5 rounded-full font-medium bg-violet-100 text-violet-700">{bvs}</span>}
          </div>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-1.5 mb-3">
        {[["Logradas",log.length,"bg-green-50 text-green-700"],["Pipeline",pip.length,"bg-yellow-50 text-yellow-700"],["Perdidas",per.length,"bg-red-50 text-red-700"]].map(([l,v,c])=>(
          <div key={l} className={`rounded-lg px-2 py-2 text-center ${c}`}><div className="text-xs font-medium opacity-70">{l}</div><div className="text-sm font-bold">{v}</div></div>
        ))}
      </div>
      <div className="border-t border-gray-100 pt-2.5">
        <div className="flex justify-between items-center">
          <span className="text-xs text-gray-500">{cots.length} cotizaciones</span>
          <span className="text-sm font-bold text-gray-800">{fmt(total)}</span>
        </div>
        {logrado>0&&<div className="mt-1.5">
          <div className="flex justify-between text-xs text-gray-500 mb-0.5"><span>Logrado</span><span className="text-green-600 font-medium">{fmt(logrado)}</span></div>
          <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:`${Math.min(100,(logrado/total)*100)}%`,background:"linear-gradient(90deg,#4ade80,#16a34a)"}}/></div>
        </div>}
      </div>
    </div>
  );
}

function CotRow({ c }) {
  const cfg = ESTADO_CFG[c.estado]||ESTADO_CFG["Se actualizó"];
  return (
    <div className="bg-white rounded-xl border border-gray-100 p-3.5 hover:shadow-sm transition-all">
      <div className="flex items-start justify-between gap-2 mb-2">
        <div className="flex-1 min-w-0">
          <div className="text-xs text-gray-400 font-mono mb-0.5">{c.codigo}</div>
          <div className="text-sm font-medium text-gray-800 leading-snug">{c.referencia}</div>
        </div>
        <div className="text-base font-bold text-gray-800 whitespace-nowrap">{fmt(c.monto)}</div>
      </div>
      <div className="flex items-center gap-2 flex-wrap">
        <span className={`flex items-center gap-1 text-xs px-2 py-0.5 rounded-full font-medium ${cfg.bg} ${cfg.text}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`}></span>{c.estado}
        </span>
        <span className="text-xs text-gray-400">{fmtD(c.fecha)}</span>
        {c.q_cierre&&<span className="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">{c.q_cierre}</span>}
        {c.mes&&<span className="text-xs text-gray-400">{c.mes}</span>}
        {c.antiguedad!=null&&c.antiguedad>0&&<span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c.antiguedad>45?"bg-red-100 text-red-600":c.antiguedad>30?"bg-orange-100 text-orange-600":"bg-gray-100 text-gray-500"}`}>{c.antiguedad}d</span>}
      </div>
    </div>
  );
}

function App() {
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [fEstado, setFEstado] = useState("Todos");
  const [fTerr, setFTerr] = useState("Todos");
  const [fMes, setFMes] = useState("Todos");
  const [sort, setSort] = useState("monto");

  const meses = useMemo(()=>["Todos",...Array.from(new Set(DATA.map(d=>d.mes).filter(Boolean)))],[]);
  const clienteMap = useMemo(()=>{const m={};DATA.forEach(d=>{if(!m[d.cliente])m[d.cliente]=[];m[d.cliente].push(d);});return m;},[]);

  const filtered = useMemo(()=>Object.entries(clienteMap)
    .filter(([c])=>c.toLowerCase().includes(search.toLowerCase()))
    .filter(([,cs])=>{
      if(fEstado!=="Todos"&&!cs.some(c=>c.estado===fEstado))return false;
      if(fTerr==="Territorio"&&!cs.some(c=>c.en_territorio==="Si"))return false;
      if(fTerr==="Externo"&&!cs.some(c=>c.en_territorio==="No"))return false;
      if(fMes!=="Todos"&&!cs.some(c=>c.mes===fMes))return false;
      return true;
    })
    .sort((a,b)=>sort==="monto"?b[1].reduce((s,c)=>s+c.monto,0)-a[1].reduce((s,c)=>s+c.monto,0):sort==="nombre"?a[0].localeCompare(b[0]):b[1].length-a[1].length)
  ,[clienteMap,search,fEstado,fTerr,fMes,sort]);

  const selCots = useMemo(()=>{
    if(!selected)return[];
    let cs=clienteMap[selected]||[];
    if(fEstado!=="Todos")cs=cs.filter(c=>c.estado===fEstado);
    if(fMes!=="Todos")cs=cs.filter(c=>c.mes===fMes);
    return cs.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  },[selected,clienteMap,fEstado,fMes]);

  const totalPipeline = DATA.reduce((s,c)=>s+c.monto,0);
  const totalLogrado = DATA.filter(c=>c.estado==="Lograda").reduce((s,c)=>s+c.monto,0);
  const totalPorConf = DATA.filter(c=>c.estado==="Por confirmar").reduce((s,c)=>s+c.monto,0);

  return (
    <div className="min-h-screen" style={{background:"#f8fafc"}}>
      <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)"}} className="text-white px-6 py-5">
        <div className="max-w-7xl mx-auto">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h1 className="text-xl font-bold">Registro de Cotizaciones 2026</h1>
              <p className="text-blue-200 text-sm mt-0.5">Walter Cedrón Zárate — Territorio I&C</p>
            </div>
            <div className="text-right text-xs text-blue-300">{Object.keys(clienteMap).length} clientes · {DATA.length} cotizaciones</div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            {[["Total Pipeline",fmt(totalPipeline),"text-white"],["Logrado",fmt(totalLogrado),"text-green-300"],["Por Confirmar",fmt(totalPorConf),"text-yellow-300"]].map(([l,v,tc])=>(
              <div key={l} className="rounded-xl px-4 py-3" style={{background:"rgba(255,255,255,0.12)"}}>
                <div className="text-blue-200 text-xs mb-0.5">{l}</div>
                <div className={`font-bold text-lg ${tc}`}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-4 py-5">
        <div className="bg-white rounded-2xl border border-gray-200 p-4 mb-5 flex flex-wrap gap-3 items-center shadow-sm">
          <input type="text" placeholder="🔍 Buscar cliente..." value={search} onChange={e=>setSearch(e.target.value)}
            className="border border-gray-200 rounded-lg px-3 py-2 text-sm flex-1 min-w-40 focus:outline-none focus:ring-2 focus:ring-blue-300"/>
          {[["fEstado",setFEstado,fEstado,["Todos","Lograda","Por confirmar","Perdido","Se actualizó"]],
            ["fTerr",setFTerr,fTerr,["Todos","Territorio","Externo"]],
            ["fMes",setFMes,fMes,meses]].map(([k,set,val,opts])=>(
            <select key={k} value={val} onChange={e=>set(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
              {opts.map(o=><option key={o}>{o}</option>)}
            </select>
          ))}
          <select value={sort} onChange={e=>setSort(e.target.value)} className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
            <option value="monto">Monto ↓</option><option value="nombre">Nombre A-Z</option><option value="cotizaciones"># Cotizaciones ↓</option>
          </select>
          {selected&&<button onClick={()=>setSelected(null)} className="text-xs text-gray-400 hover:text-gray-600 underline">Limpiar</button>}
        </div>

        <div className="flex gap-5">
          <div className={`transition-all duration-300 ${selected?"w-2/5":"w-full"}`}>
            <div className="text-xs text-gray-400 mb-3 font-medium">{filtered.length} clientes encontrados</div>
            <div className={`grid gap-3 ${selected?"grid-cols-1":"grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"}`}>
              {filtered.map(([c,cs])=><ClientCard key={c} cliente={c} cots={cs} onClick={setSelected} selected={selected===c}/>)}
            </div>
            {filtered.length===0&&<div className="text-center text-gray-400 py-12">No se encontraron clientes</div>}
          </div>

          {selected&&(
            <div className="w-3/5 sticky top-4 self-start">
              <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)"}} className="px-5 py-4 text-white">
                  <div className="flex items-center justify-between mb-1">
                    <div className="font-bold text-lg">{selected}</div>
                    <button onClick={()=>setSelected(null)} className="text-blue-200 hover:text-white text-2xl leading-none">×</button>
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    {(()=>{const cs=clienteMap[selected]||[];const seg=cs[0]?.segmento;const bvs=cs[0]?.segmento_bvs;const enT=cs.some(c=>c.en_territorio==="Si");
                    return[seg,bvs,enT?"En Territorio":"Fuera Territorio"].filter(Boolean).map(t=><span key={t} className="text-xs px-2 py-0.5 rounded-full" style={{background:"rgba(255,255,255,0.2)"}}>{t}</span>);})()}
                  </div>
                </div>
                <div className="grid grid-cols-4 border-b border-gray-100">
                  {(()=>{const all=clienteMap[selected]||[];
                  const log=all.filter(c=>c.estado==="Lograda");const pip=all.filter(c=>c.estado==="Por confirmar");const per=all.filter(c=>c.estado==="Perdido");
                  return[["Total",fmt(all.reduce((s,c)=>s+c.monto,0)),"text-gray-800"],[`${log.length} Logradas`,fmt(log.reduce((s,c)=>s+c.monto,0)),"text-green-600"],[`${pip.length} Pipeline`,fmt(pip.reduce((s,c)=>s+c.monto,0)),"text-yellow-600"],[`${per.length} Perdidas`,fmt(per.reduce((s,c)=>s+c.monto,0)),"text-red-500"]]
                  .map(([l,v,tc])=><div key={l} className="px-3 py-3 text-center border-r border-gray-100 last:border-0"><div className="text-xs text-gray-400">{l}</div><div className={`text-xs font-bold ${tc}`}>{v}</div></div>);})()}
                </div>
                <div className="p-4 overflow-y-auto" style={{maxHeight:"420px"}}>
                  <div className="text-xs font-medium text-gray-400 mb-3 uppercase tracking-wide">Cotizaciones ({selCots.length})</div>
                  <div className="flex flex-col gap-2">
                    {selCots.length===0?<div className="text-center text-gray-400 py-6 text-sm">Sin cotizaciones</div>:selCots.map(c=><CotRow key={c.codigo} c={c}/>)}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
