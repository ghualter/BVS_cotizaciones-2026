  const [fEstado,setFEstado]=useState('Todos');
  const [fTerr,setFTerr]=useState('Todos');
  const [fMes,setFMes]=useState('Todos');
  const [sort,setSort]=useState('monto');
  const [selected,setSelected]=useState(null);

  const meses=useMemo(()=>['Todos',...[...new Set(T1_RAW.map(d=>d.Mes).filter(Boolean))]],'');
  const clienteMap=useMemo(()=>{const m={};T1_RAW.forEach(d=>{if(!m[d.Cliente])m[d.Cliente]=[];m[d.Cliente].push(d);});return m;},[]);

  const filtered=useMemo(()=>Object.entries(clienteMap)
    .filter(([c])=>c.toLowerCase().includes(search.toLowerCase()))
    .filter(([,cs])=>{
      if(fEstado!=='Todos'&&!cs.some(c=>c.Estado===fEstado))return false;
      if(fTerr==='Territorio'&&!cs.some(c=>c.En_Territorio==='Si'))return false;
      if(fTerr==='Externo'&&!cs.some(c=>c.En_Territorio==='No'))return false;
      if(fMes!=='Todos'&&!cs.some(c=>c.Mes===fMes))return false;
      return true;
    })
    .sort((a,b)=>sort==='monto'?b[1].reduce((s,c)=>s+c.Monto,0)-a[1].reduce((s,c)=>s+c.Monto,0)
      :sort==='nombre'?a[0].localeCompare(b[0]):b[1].length-a[1].length)
  ,[clienteMap,search,fEstado,fTerr,fMes,sort]);

  const selCots=useMemo(()=>{
    if(!selected)return[];
    let cs=clienteMap[selected]||[];
    if(fEstado!=='Todos')cs=cs.filter(c=>c.Estado===fEstado);
    if(fMes!=='Todos')cs=cs.filter(c=>c.Mes===fMes);
    return cs.sort((a,b)=>new Date(b.fecha_str)-new Date(a.fecha_str));
  },[selected,clienteMap,fEstado,fMes]);

  return(
    <div className="fade-in">
      {/* Filters */}
      <div style={{background:'#fff',borderRadius:14,border:'1px solid #e2e8f0',padding:'12px 16px',marginBottom:14,display:'flex',flexWrap:'wrap',gap:8,alignItems:'center',boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
        <input type="text" placeholder="🔍 Buscar cliente..." value={search} onChange={e=>setSearch(e.target.value)}
          style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 12px',fontSize:13,flex:1,minWidth:160,outline:'none'}}/>
        {[[fEstado,setFEstado,['Todos','Lograda','Por confirmar','Perdido','Se actualizó']],
          [fTerr,setFTerr,['Todos','Territorio','Externo']],
          [fMes,setFMes,meses]].map(([val,set,opts],i)=>(
          <select key={i} value={val} onChange={e=>set(e.target.value)}
            style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 10px',fontSize:13,outline:'none',background:'#fff'}}>
            {opts.map(o=><option key={o}>{o}</option>)}
          </select>
        ))}
        <select value={sort} onChange={e=>setSort(e.target.value)}
          style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'7px 10px',fontSize:13,outline:'none',background:'#fff'}}>
          <option value="monto">Monto ↓</option>
          <option value="nombre">Nombre A–Z</option>
          <option value="cotizaciones"># Cotiz. ↓</option>
        </select>
        {selected&&<button onClick={()=>setSelected(null)} style={{fontSize:12,color:'#94a3b8',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Limpiar</button>}
      </div>
      <div style={{fontSize:11,color:'#94a3b8',marginBottom:10}}>{filtered.length} clientes encontrados</div>

      <div className="flex gap-4">
        {/* Cards */}
        <div style={{flex:selected?'0 0 38%':'1',transition:'flex .3s'}}>
          <div className={`grid gap-3 ${selected?'':'sm:grid-cols-2 lg:grid-cols-3'}`}>
            {filtered.map(([c,cs])=><ClientCard key={c} cliente={c} cots={cs} selected={selected} onClick={setSelected}/>)}
          </div>
          {filtered.length===0&&<div style={{textAlign:'center',color:'#94a3b8',padding:48,fontSize:14}}>No se encontraron clientes</div>}
        </div>
        {/* Detail */}
        {selected&&(
          <div style={{flex:'0 0 60%',position:'sticky',top:12,alignSelf:'start'}} className="fade-in">
            <div style={{background:'#fff',borderRadius:16,border:'1px solid #e2e8f0',overflow:'hidden',boxShadow:'0 4px 20px rgba(30,58,138,.08)'}}>
              <div style={{background:'linear-gradient(135deg,#0f172a,#1e3a8a)',padding:'14px 18px'}}>
                <div className="flex justify-between items-center mb-2">
                  <div style={{fontWeight:700,color:'#fff',fontSize:16}}>{selected}</div>
                  <button onClick={()=>setSelected(null)} style={{color:'#93c5fd',background:'none',border:'none',fontSize:22,cursor:'pointer',lineHeight:1}}>×</button>
                </div>
                <div className="flex gap-2 flex-wrap">
                  {(()=>{const cs=clienteMap[selected]||[];const seg=cs[0]?.Segmento;const bvs=cs[0]?.Segmento_BVS;const enT=cs.some(c=>c.En_Territorio==='Si');
                  const oppCrm=T5_RAW.filter(r=>r.cuenta===cs[0]?.Cuenta_Territorio);
                  return[
                    seg&&<span key="seg" className={`badge seg-${seg}`}>{seg}</span>,
                    bvs&&bvs!=='Fuera Territorio'&&<span key="bvs" style={{background:'rgba(255,255,255,.15)',color:'#e0f2fe',borderRadius:99,padding:'2px 8px',fontSize:11}}>{bvs}</span>,
                    <span key="terr" style={{background:enT?'rgba(34,197,94,.25)':'rgba(255,255,255,.1)',color:enT?'#86efac':'#93c5fd',borderRadius:99,padding:'2px 8px',fontSize:11}}>{enT?'En Territorio':'Externo'}</span>,
                    oppCrm.length>0&&<span key="crm" style={{background:'#049fd9',color:'#fff',borderRadius:99,padding:'2px 8px',fontSize:11,fontWeight:600}}>🔵 {oppCrm.length} opps CRM</span>
                  ];})()}
                </div>
              </div>
              {/* Stats */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',borderBottom:'1px solid #f1f5f9'}}>
                {(()=>{const all=clienteMap[selected]||[];
                const l=all.filter(c=>c.Estado==='Lograda'),p=all.filter(c=>c.Estado==='Por confirmar'),pe=all.filter(c=>c.Estado==='Perdido');
                return[['Total',fmt(all.reduce((s,c)=>s+c.Monto,0)),'#0f172a'],
                       [`${l.length} Logradas`,fmt(l.reduce((s,c)=>s+c.Monto,0)),'#16a34a'],
                       [`${p.length} Pipeline`,fmt(p.reduce((s,c)=>s+c.Monto,0)),'#d97706'],
                       [`${pe.length} Perdidas`,fmt(pe.reduce((s,c)=>s+c.Monto,0)),'#dc2626']]
                .map(([l2,v,tc])=>(
                  <div key={l2} style={{padding:'10px',textAlign:'center',borderRight:'1px solid #f1f5f9'}}>
                    <div style={{fontSize:10,color:'#94a3b8',marginBottom:2}}>{l2}</div>
                    <div style={{fontSize:12,fontWeight:700,color:tc}}>{v}</div>
                  </div>
                ));})()}
              </div>
              {/* CRM opps for this account */}
              {(()=>{const ct=clienteMap[selected]?.[0]?.Cuenta_Territorio;const opps=T5_RAW.filter(r=>r.cuenta===ct);
              if(!opps.length)return null;
              return(
                <div style={{margin:'10px 14px',background:'#eff6ff',borderRadius:10,padding:'10px 14px',border:'1px solid #bfdbfe'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#1e40af',marginBottom:8}}>🔵 OPORTUNIDADES CRM — {opps.length} activas · {fmt(opps.reduce((s,r)=>s+r.ingresos,0))}</div>
                  {opps.map(op=>(
                    <div key={op.op_id} style={{fontSize:11,padding:'4px 0',borderBottom:'1px solid #dbeafe',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{color:'#374151',flex:1}}>{op.tema?.slice(0,55)}{op.tema?.length>55?'…':''}</span>
                      <div className="flex gap-1 items-center ml-2">
                        <FabBadge f={op.fabricante}/>
                        <span style={{fontWeight:700,color:'#1e40af',minWidth:70,textAlign:'right'}}>{fmt(op.ingresos)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              );})()}
              {/* Cotizaciones list */}
              <div style={{padding:'0 14px 14px',overflowY:'auto',maxHeight:380}}>
                <div style={{fontSize:11,fontWeight:600,color:'#94a3b8',margin:'12px 0 8px',textTransform:'uppercase',letterSpacing:.5}}>Cotizaciones ({selCots.length})</div>
                <div className="flex flex-col gap-2">
                  {selCots.length===0
                    ?<div style={{textAlign:'center',color:'#94a3b8',padding:20,fontSize:13}}>Sin cotizaciones</div>
                    :selCots.map(c=><CotRow key={c.Codigo} c={c}/>)}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ClientCard({cliente,cots,selected,onClick}){
  const log=cots.filter(c=>c.Estado==='Lograda'),pip=cots.filter(c=>c.Estado==='Por confirmar'),per=cots.filter(c=>c.Estado==='Perdido');
  const total=cots.reduce((s,c)=>s+c.Monto,0),logM=log.reduce((s,c)=>s+c.Monto,0);
  const seg=cots[0]?.Segmento||'',bvs=cots[0]?.Segmento_BVS||'',enT=cots.some(c=>c.En_Territorio==='Si');
  const ciscoM=cots.filter(c=>isCisco(c)).reduce((s,c)=>s+c.Monto,0),ciscoSh=pct(ciscoM,total);
  const crmOpps=T5_RAW.filter(r=>r.cuenta===cots[0]?.Cuenta_Territorio);
  const ini=cliente.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const isSel=selected===cliente;
  return(
    <div onClick={()=>onClick(cliente)} className="card-hover fade-in"
      style={{borderRadius:14,border:`2px solid ${isSel?'#2563eb':'#e2e8f0'}`,background:isSel?'#eff6ff':'#fff',cursor:'pointer',padding:14,transition:'all .18s'}}>
      <div className="flex items-start gap-3 mb-3">
        <div style={{width:38,height:38,borderRadius:'50%',background:'linear-gradient(135deg,#1e40af,#3b82f6)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:12,flexShrink:0}}>{ini}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,color:'#0f172a',fontSize:13,lineHeight:1.3,marginBottom:4}}>{cliente}</div>
          <div className="flex flex-wrap gap-1">
            <SegBadge s={seg}/>
            <span className="badge" style={{background:enT?'#d1fae5':'#f1f5f9',color:enT?'#065f46':'#64748b'}}>{enT?'Territorio':'Externo'}</span>
            {bvs&&bvs!=='Fuera Territorio'&&<span className="badge" style={{background:'#f5f3ff',color:'#7c3aed'}}>{bvs}</span>}
            {crmOpps.length>0&&<span className="badge" style={{background:'#e0f5fc',color:'#0369a1'}}>🔵 {crmOpps.length} CRM</span>}
          </div>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-1.5 mb-3">
        {[['✓',log.length,'#dcfce7','#166534'],['⏳',pip.length,'#fef9c3','#854d0e'],['✕',per.length,'#fee2e2','#991b1b']].map(([ic,v,bg,tc])=>(
          <div key={ic} style={{background:bg,borderRadius:8,padding:'5px 4px',textAlign:'center'}}>
            <div style={{fontSize:9,color:tc,opacity:.7}}>{ic}</div>
            <div style={{fontSize:13,fontWeight:700,color:tc}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{borderTop:'1px solid #f1f5f9',paddingTop:8}}>
        <div className="flex justify-between items-center">
          <span style={{fontSize:11,color:'#94a3b8'}}>{cots.length} cotiz.</span>
          <span style={{fontSize:14,fontWeight:700,color:'#0f172a'}}>{fmt(total)}</span>
        </div>
        {logM>0&&<div style={{marginTop:6}}>
          <div className="flex justify-between" style={{fontSize:10,color:'#64748b',marginBottom:2}}><span>Logrado</span><span style={{color:'#16a34a',fontWeight:600}}>{fmt(logM)}</span></div>
          <div style={{height:4,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,pct(logM,total))}%`,background:'linear-gradient(90deg,#4ade80,#16a34a)',borderRadius:99}}/></div>
        </div>}
        {ciscoSh>0&&<div style={{marginTop:6,display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:10,color:'#0369a1'}}>🔵 Cisco</span>
          <div style={{flex:1,height:3,background:'#e0f2fe',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,ciscoSh)}%`,background:'#0ea5e9',borderRadius:99}}/></div>
          <span style={{fontSize:10,fontWeight:600,color:'#0369a1'}}>{ciscoSh}%</span>
        </div>}
      </div>
    </div>
  );
}

function CotRow({c}){
  const cfgs={Lograda:{bg:'#dcfce7',tc:'#166534',dot:'#22c55e'},
    'Por confirmar':{bg:'#fef9c3',tc:'#854d0e',dot:'#eab308'},
    Perdido:{bg:'#fee2e2',tc:'#991b1b',dot:'#ef4444'},
    'Se actualizó':{bg:'#dbeafe',tc:'#1e40af',dot:'#60a5fa'}};
  const cfg=cfgs[c.Estado]||cfgs['Se actualizó'];
  const cisco=isCisco(c);
  return(
    <div style={{background:'#fff',borderRadius:10,border:'1px solid #e2e8f0',padding:'10px 12px'}}>
      <div className="flex items-start justify-between gap-2 mb-2">
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,color:'#94a3b8',fontFamily:'monospace',marginBottom:1}}>{c.Codigo}</div>
          <div style={{fontSize:12,fontWeight:600,color:'#1e293b',lineHeight:1.35}}>{c.Referencia}</div>
        </div>
        <div style={{fontSize:14,fontWeight:700,color:'#1e293b',whiteSpace:'nowrap'}}>{fmt(c.Monto)}</div>
      </div>
      <div className="flex items-center gap-1.5 flex-wrap">
        <span className="badge" style={{background:cfg.bg,color:cfg.tc}}>
          <span style={{width:5,height:5,borderRadius:'50%',background:cfg.dot,display:'inline-block'}}></span>{c.Estado}
        </span>
        <span style={{fontSize:11,color:'#94a3b8'}}>{fmtD(c.fecha_str)}</span>
        {cisco&&<span className="badge" style={{background:'#e0f5fc',color:'#0369a1'}}>🔵 Cisco</span>}
        {c.Q_Cierre&&<span className="badge" style={{background:'#dbeafe',color:'#1e40af'}}>{c.Q_Cierre}</span>}
        {c.Antigüedad_Dias>0&&<span className="badge" style={{background:c.Antigüedad_Dias>45?'#fee2e2':c.Antigüedad_Dias>30?'#ffedd5':'#f1f5f9',color:c.Antigüedad_Dias>45?'#991b1b':c.Antigüedad_Dias>30?'#c2410c':'#64748b'}}>{Math.round(c.Antigüedad_Dias)}d</span>}
      </div>
    </div>
  );
}

/* SECTION 3 – CRM DYNAMICS (T5)                                          */
/* ══════════════════════════════════════════════════════════════════════ */
function SecCRM(){
  const [fFab,setFab]=useState('Todos');
  const [fFase,setFase]=useState('Todos');
  const [fFcst,setFcst]=useState('Todos');
  const [search,setSearch]=useState('');
  const [sort,setSort]=useState('ingresos');

  const fabs =['Todos',...[...new Set(T5_RAW.map(r=>r.fabricante).filter(Boolean))].sort()];
  const fases=['Todos',...[...new Set(T5_RAW.map(r=>r.fase).filter(Boolean))].sort()];
  const fcsts=['Todos',...[...new Set(T5_RAW.map(r=>r.fcst_status).filter(Boolean))].sort()];

  const filtered=useMemo(()=>T5_RAW
    .filter(r=>fFab==='Todos'||r.fabricante===fFab)
    .filter(r=>fFase==='Todos'||r.fase===fFase)
    .filter(r=>fFcst==='Todos'||r.fcst_status===fFcst)
    .filter(r=>!search||(r.cuenta||'').toLowerCase().includes(search.toLowerCase())||(r.tema||'').toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>sort==='ingresos'?b.ingresos-a.ingresos:sort==='cuenta'?a.cuenta?.localeCompare(b.cuenta||''):new Date(a.fecha_cierre_str)-new Date(b.fecha_cierre_str))
  ,[fFab,fFase,fFcst,search,sort]);

  const totals=useMemo(()=>({
    total:filtered.reduce((s,r)=>s+r.ingresos,0),
    gan:filtered.reduce((s,r)=>s+r.ganancia_abs,0),
    n:filtered.length
  }),[filtered]);

  return(
    <div className="fade-in">
      {/* Summary cards */}
      <div className="grid gap-3 mb-4" style={{gridTemplateColumns:'repeat(4,minmax(0,1fr))'}}>
        {[
          {l:'Pipeline filtrado',v:fmt(totals.total),s:`${totals.n} oportunidades`},
          {l:'Ganancia estimada',v:fmt(totals.gan),s:'margen ~18% promedio'},
          {l:'Commit + Strong',v:fmt(filtered.filter(r=>r.fcst_status==='Commit'||r.fcst_status==='Strong Upside').reduce((s,r)=>s+r.ingresos,0)),s:'alta probabilidad'},
          {l:'Alertas semáforo',v:String(filtered.filter(r=>r.semaforo==='Alerta').length),s:`${fmt(filtered.filter(r=>r.semaforo==='Alerta').reduce((s,r)=>s+r.ingresos,0))} en riesgo timing`},
        ].map(k=>(
          <div key={k.l} style={{background:'#fff',borderRadius:12,border:'1px solid #e2e8f0',padding:'12px 14px',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
            <div style={{fontSize:11,color:'#64748b',marginBottom:3}}>{k.l}</div>
            <div style={{fontSize:18,fontWeight:700,color:'#0f172a'}}>{k.v}</div>
            <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{k.s}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{background:'#fff',borderRadius:12,border:'1px solid #e2e8f0',padding:'10px 14px',marginBottom:12,display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
        <input type="text" placeholder="🔍 Buscar cuenta u oportunidad..." value={search} onChange={e=>setSearch(e.target.value)}
          style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 12px',fontSize:13,flex:1,minWidth:180,outline:'none'}}/>
        {[[fFab,setFab,fabs,'Fabricante'],[fFase,setFase,fases,'Fase'],[fFcst,setFcst,fcsts,'FCST']].map(([val,set,opts,ph],i)=>(
          <select key={i} value={val} onChange={e=>set(e.target.value)}
            style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 10px',fontSize:13,outline:'none',background:'#fff'}}>
            {opts.map(o=><option key={o}>{o}</option>)}
          </select>
        ))}
        <select value={sort} onChange={e=>setSort(e.target.value)}
          style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 10px',fontSize:13,outline:'none',background:'#fff'}}>
          <option value="ingresos">Valor ↓</option>
          <option value="cuenta">Cuenta A–Z</option>
          <option value="fecha">Cierre ↑</option>
        </select>
      </div>
      <div style={{fontSize:11,color:'#94a3b8',marginBottom:8}}>{totals.n} oportunidades · {fmt(totals.total)} total</div>

      {/* Table */}
      <div style={{background:'#fff',borderRadius:14,border:'1px solid #e2e8f0',overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr>
              <th>OP ID</th><th>Cuenta</th><th>Oportunidad</th><th>Tecnología</th>
              <th>Fabricante</th><th>Fase</th><th>FCST</th><th style={{textAlign:'right'}}>Valor</th>
              <th style={{textAlign:'right'}}>Ganancia</th><th>% Gan.</th><th>% Éxito</th>
              <th>Cierre Est.</th><th>Semáforo</th>
            </tr></thead>
            <tbody>
              {filtered.map(r=>{
                const t1cots=T1_RAW.filter(c=>c.Cuenta_Territorio===r.cuenta);
                return(
                  <tr key={r.op_id}>
                    <td style={{fontSize:10,color:'#7c3aed',fontFamily:'monospace',whiteSpace:'nowrap'}}>{r.op_id}</td>
                    <td style={{fontWeight:600,color:'#0f172a',whiteSpace:'nowrap'}}>{r.cuenta}</td>
                    <td style={{maxWidth:260}}>
                      <div style={{fontSize:12,color:'#374151',lineHeight:1.35}}>{r.tema}</div>
                      {t1cots.length>0&&<div style={{fontSize:10,color:'#0369a1',marginTop:2}}>📋 {t1cots.length} cotiz. T1 · {fmt(t1cots.reduce((s,c)=>s+c.Monto,0))}</div>}
                    </td>
                    <td><span style={{fontSize:11,color:'#64748b'}}>{r.tecnologia}</span></td>
                    <td><FabBadge f={r.fabricante}/></td>
                    <td><FaseBadge f={r.fase}/></td>
                    <td><FcstBadge f={r.fcst_status}/></td>
                    <td style={{textAlign:'right',fontWeight:700,color:'#0f172a',whiteSpace:'nowrap'}}>{fmt(r.ingresos)}</td>
                    <td style={{textAlign:'right',color:'#16a34a',fontWeight:600,whiteSpace:'nowrap'}}>{fmt(r.ganancia_abs)}</td>
                    <td style={{textAlign:'center'}}><span style={{fontSize:11,color:'#64748b'}}>{r.pct_ganancia}%</span></td>
                    <td style={{textAlign:'center'}}>
                      {r.pct_exito>0
                        ?<span style={{fontSize:11,fontWeight:600,color:r.pct_exito>=70?'#16a34a':r.pct_exito>=40?'#d97706':'#dc2626'}}>{r.pct_exito}%</span>
                        :<span style={{fontSize:11,color:'#94a3b8'}}>–</span>}
                    </td>
                    <td style={{whiteSpace:'nowrap',fontSize:11,color:'#374151'}}>{fmtM(r.fecha_cierre_str)}</td>
                    <td><SemBadge s={r.semaforo}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* SECTION 4 – ANÁLISIS CISCO                                             */
/* ══════════════════════════════════════════════════════════════════════ */
function SecCisco(){
  const ciscoT1 =T1_RAW.filter(r=>isCisco(r));
  const ciscoT5 =T5_RAW.filter(r=>r.fabricante==='CISCO');
  const totalT1 =T1_RAW.reduce((s,r)=>s+r.Monto,0);
  const totalT5 =T5_RAW.reduce((s,r)=>s+r.ingresos,0);
  const ciscoT1M=ciscoT1.reduce((s,r)=>s+r.Monto,0);
  const ciscoT5M=ciscoT5.reduce((s,r)=>s+r.ingresos,0);

  // By account – CRM
  const byAcct=Object.entries(ciscoT5.reduce((m,r)=>{if(!m[r.cuenta])m[r.cuenta]={pip:0,n:0};m[r.cuenta].pip+=r.ingresos;m[r.cuenta].n++;return m;},{}))
    .sort((a,b)=>b[1].pip-a[1].pip);

  return(
    <div className="fade-in">
      <div style={{background:'#eff6ff',borderRadius:10,padding:'12px 16px',border:'1px solid #bfdbfe',marginBottom:14,fontSize:13,color:'#1e40af'}}>
        ⚠️ <strong>Gap Cisco crítico:</strong> Pipeline CRM Cisco = <strong>{pct(ciscoT5M,totalT5)}%</strong> ({fmt(ciscoT5M)}). Cotizaciones T1 Cisco = <strong>{pct(ciscoT1M,totalT1)}%</strong>. Meta: <strong>80%</strong>. Necesitas desarrollar ~<strong>{fmt(totalT5*0.8-ciscoT5M)}</strong> adicionales en oportunidades Cisco.
      </div>

      <div className="grid gap-4" style={{gridTemplateColumns:'1fr 1fr',marginBottom:14}}>
        {/* CRM vs T1 comparison */}
        <div className="panel-card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Cisco: CRM vs Cotizaciones T1</div>
          {[
            ['Pipeline CRM Cisco',fmt(ciscoT5M),`${pct(ciscoT5M,totalT5)}%`,'#0369a1',pct(ciscoT5M,totalT5)],
            ['Meta Cisco 80%',fmt(totalT5*0.8),'80%','#16a34a',80],
            ['T1 Cotizaciones Cisco',fmt(ciscoT1M),`${pct(ciscoT1M,totalT1)}%`,'#7c3aed',pct(ciscoT1M,totalT1)],
            ['Gap por cubrir',fmt(totalT5*0.8-ciscoT5M),'','#dc2626',0],
          ].map(([lbl,val,pctStr,color,p])=>(
            <div key={lbl} style={{marginBottom:10}}>
              <div className="flex justify-between" style={{fontSize:12,marginBottom:3}}>
                <span style={{color:'#374151'}}>{lbl}</span>
                <span style={{fontWeight:700,color}}>{val} {pctStr&&<span style={{color:'#94a3b8',fontWeight:400}}>({pctStr})</span>}</span>
              </div>
              {p>0&&<div style={{height:6,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,p)}%`,background:color,borderRadius:99}}/></div>}
            </div>
          ))}
        </div>

        {/* Cisco by account CRM */}
        <div className="panel-card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Pipeline Cisco por Cuenta (CRM)</div>
          {byAcct.map(([ct,{pip,n}])=>(
            <div key={ct} style={{marginBottom:8}}>
              <div className="flex justify-between" style={{fontSize:12,marginBottom:2}}>
                <span style={{fontWeight:600,color:'#0f172a'}}>{ct}</span>
                <span style={{color:'#0369a1',fontWeight:700}}>{fmt(pip)} <span style={{color:'#94a3b8',fontWeight:400}}>({n} opps)</span></span>
              </div>
              <div style={{height:5,background:'#e0f2fe',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct(pip,ciscoT5M)}%`,background:'#0ea5e9',borderRadius:99}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Cisco opps by fase */}
      <div className="panel-card" style={{marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Oportunidades Cisco Activas — {ciscoT5.length} opps · {fmt(ciscoT5M)}</div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr><th>OP ID</th><th>Cuenta</th><th>Oportunidad</th><th>Fase</th><th>FCST</th><th style={{textAlign:'right'}}>Valor</th><th>% Éxito</th><th>Cierre</th><th>Semáforo</th><th>Cotiz. T1</th></tr></thead>
            <tbody>
              {ciscoT5.sort((a,b)=>b.ingresos-a.ingresos).map(r=>{
                const t1c=T1_RAW.filter(c=>c.Cuenta_Territorio===r.cuenta&&isCisco(c));
                return(
                  <tr key={r.op_id}>
                    <td style={{fontSize:10,color:'#7c3aed',fontFamily:'monospace'}}>{r.op_id}</td>
                    <td style={{fontWeight:600,color:'#0369a1'}}>{r.cuenta}</td>
                    <td style={{fontSize:12,maxWidth:220,color:'#374151'}}>{r.tema?.slice(0,55)}{r.tema?.length>55?'…':''}</td>
                    <td><FaseBadge f={r.fase}/></td>
                    <td><FcstBadge f={r.fcst_status}/></td>
                    <td style={{textAlign:'right',fontWeight:700,color:'#0369a1'}}>{fmt(r.ingresos)}</td>
                    <td style={{textAlign:'center'}}>{r.pct_exito>0?<span style={{fontSize:11,fontWeight:600,color:r.pct_exito>=70?'#16a34a':r.pct_exito>=40?'#d97706':'#94a3b8'}}>{r.pct_exito}%</span>:<span style={{color:'#94a3b8',fontSize:11}}>–</span>}</td>
                    <td style={{fontSize:11,whiteSpace:'nowrap'}}>{fmtM(r.fecha_cierre_str)}</td>
                    <td><SemBadge s={r.semaforo}/></td>
                    <td>
                      {t1c.length>0
                        ?<span className="badge" style={{background:'#dcfce7',color:'#166534'}}>✓ {t1c.length} cotiz.</span>
                        :<span className="badge" style={{background:'#fee2e2',color:'#991b1b'}}>Sin cotiz.</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Action plan */}
      <div className="panel-card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>⚡ Plan de Acción Cisco — Cuentas sin Cotización Activa</div>
        <div className="grid gap-3" style={{gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))'}}>
          {[
            {ct:'GOODYEAR',pip:'$230,000',fase:'3-Propuesta',fcst:'Upside',fecha:'Jun 2026',accion:'Enviar cotización Networking Cisco — mayor opp sin propuesta enviada en T1'},
            {ct:'CONTUGAS',pip:'$50,000',fase:'3-Propuesta',fcst:'Commit',fecha:'May 2026',accion:'URGENTE: Status Commit — cotización Switching pendiente de envío'},
            {ct:'COES-SINAC',pip:'$400,000',fase:'2-Cal.',fcst:'Upside',fecha:'May–Ago 2026',accion:'2 opps calificadas $400K — agendar visita diagnóstica esta semana'},
            {ct:'RPP',pip:'$9,000',fase:'2-Cal.',fcst:'Upside',fecha:'May 2026',accion:'Switches Cisco — cotización pendiente de formalizar'},
          ].map(a=>(
            <div key={a.ct} style={{background:'#f8fafc',borderRadius:10,padding:'12px 14px',border:'1px solid #e2e8f0',borderLeft:'3px solid #0369a1'}}>
              <div style={{fontWeight:700,color:'#0f172a',fontSize:14,marginBottom:4}}>{a.ct}</div>
              <div className="flex gap-1 flex-wrap mb-2">
                <span style={{fontSize:12,fontWeight:700,color:'#0369a1'}}>{a.pip}</span>
                <FaseBadge f={a.fase}/>
                <FcstBadge f={a.fcst}/>
              </div>
              <div style={{fontSize:11,color:'#374151',marginBottom:4}}>{a.accion}</div>
              <div style={{fontSize:10,color:'#94a3b8'}}>Cierre est.: {a.fecha}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════ */
/* SECTION 5 – KPIs INTEGRADOS                                            */
/* ══════════════════════════════════════════════════════════════════════ */
function SecKPIs(){
  const totalT1=T1_RAW.reduce((s,r)=>s+r.Monto,0);
  const logrado=T1_RAW.filter(r=>r.Estado==='Lograda').reduce((s,r)=>s+r.Monto,0);
  const perdido=T1_RAW.filter(r=>r.Estado==='Perdido').reduce((s,r)=>s+r.Monto,0);
  const porConf=T1_RAW.filter(r=>r.Estado==='Por confirmar').reduce((s,r)=>s+r.Monto,0);
  const totalT5=T5_RAW.reduce((s,r)=>s+r.ingresos,0);
  const ganancia=T5_RAW.reduce((s,r)=>s+r.ganancia_abs,0);
  const ciscoT5=T5_RAW.filter(r=>r.fabricante==='CISCO').reduce((s,r)=>s+r.ingresos,0);

  // by mes T1
  const byMes={'Ene 2026':0,'Feb 2026':0,'Mar 2026':0};
  T1_RAW.forEach(r=>{if(r.Mes&&byMes[r.Mes]!==undefined)byMes[r.Mes]+=r.Monto;});
  const maxMes=Math.max(...Object.values(byMes));

  // by segmento T5
  const bySeg={};
  T5_RAW.filter(r=>r.cuenta!=='FUERA DE TERRITORIO').forEach(r=>{
    const ct=r.cuenta;
    const t1r=T1_RAW.find(c=>c.Cuenta_Territorio===ct);
    const seg=t1r?.Segmento||'Servicios';
    if(!bySeg[seg])bySeg[seg]={pip:0,n:0};
    bySeg[seg].pip+=r.ingresos; bySeg[seg].n++;
  });

  const SEG_COLORS={Industria:'#7c3aed',Servicios:'#1e40af',Comercio:'#c2410c',Financiero:'#0f766e',Media:'#9d174d'};

  return(
    <div className="fade-in grid gap-4" style={{gridTemplateColumns:'1fr 1fr'}}>
      {/* Cuota trimestral */}
      <div className="panel-card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>📅 Cuota vs Avance por Trimestre</div>
        {[['Q1 (Ene–Mar)',600000,logrado],['Q2 (Abr–Jun)',750000,0],['Q3 (Jul–Sep)',750000,0],['Q4 (Oct–Dic)',900000,0]].map(([q,cuota,lg])=>{
          const p=pct(lg,cuota);
          return(
            <div key={q} style={{marginBottom:12}}>
              <div className="flex justify-between" style={{fontSize:12,marginBottom:3}}>
                <span style={{fontWeight:600,color:'#1e293b'}}>{q}</span>
                <span style={{color:'#64748b'}}>{fmt(lg)} <span style={{color:'#94a3b8'}}>/ {fmt(cuota)}</span></span>
                <span style={{fontWeight:700,color:p>=70?'#16a34a':lg>0?'#dc2626':'#94a3b8'}}>{p}%</span>
              </div>
              <div style={{height:8,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.min(100,p)}%`,borderRadius:99,background:p>=70?'linear-gradient(90deg,#4ade80,#16a34a)':lg>0?'linear-gradient(90deg,#fca5a5,#ef4444)':'#e2e8f0',transition:'width .6s ease'}}/>
              </div>
              {!p&&lg===0&&<div style={{fontSize:10,color:'#94a3b8',marginTop:2}}>Pendiente</div>}
              {p>0&&p<70&&<div style={{fontSize:10,color:'#dc2626',marginTop:2}}>⚠️ Below Target — meta &gt;70%</div>}
            </div>
          );
        })}
      </div>

      {/* Pipeline T1 estados */}
      <div className="panel-card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>💰 Pipeline T1 por Estado</div>
        {[['Logrado',logrado,'#16a34a'],['Por confirmar',porConf,'#d97706'],['Perdido',perdido,'#dc2626'],['Actualizado/SE',totalT1-logrado-porConf-perdido,'#2563eb']].map(([lbl,v,color])=>v>0?(
          <div key={lbl} style={{marginBottom:10}}>
            <div className="flex justify-between" style={{fontSize:12,marginBottom:3}}>
              <span style={{color:'#374151'}}>{lbl}</span>
              <span style={{fontWeight:700,color}}>{fmt(v)} <span style={{color:'#94a3b8',fontWeight:400}}>({pct(v,totalT1)}%)</span></span>
            </div>
            <div style={{height:6,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct(v,totalT1)}%`,background:color,borderRadius:99}}/>
            </div>
          </div>
        ):null)}
        <div style={{marginTop:14,padding:'10px 12px',background:'#eff6ff',borderRadius:8,fontSize:12}}>
          <div style={{color:'#1e40af',fontWeight:600,marginBottom:4}}>🔵 Cisco en T1</div>
          <div className="flex justify-between">
            <span style={{color:'#374151'}}>{fmt(T1_RAW.filter(r=>isCisco(r)).reduce((s,r)=>s+r.Monto,0))}</span>
            <span style={{fontWeight:700,color:'#dc2626'}}>{pct(T1_RAW.filter(r=>isCisco(r)).reduce((s,r)=>s+r.Monto,0),totalT1)}% <span style={{color:'#94a3b8',fontWeight:400}}>(meta 80%)</span></span>
          </div>
        </div>
      </div>

      {/* Pipeline CRM por mes */}
      <div className="panel-card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>📊 Pipeline CRM por Mes de Cierre</div>
        {Object.entries({'Mar 26':41369,'Abr 26':437469,'May 26':1029959,'Jun 26':1075990,'Jul 26':815000,'Ago 26':1089000,'Sep 26':400000}).map(([mes,v])=>{
          const isCiscoMonth=mes==='Mar 26'||mes==='Abr 26';
          return(
            <div key={mes} style={{marginBottom:8}}>
              <div className="flex justify-between" style={{fontSize:12,marginBottom:2}}>
                <span style={{color:'#374151',minWidth:50}}>{mes}</span>
                <span style={{fontWeight:600,color:'#0f172a'}}>{fmt(v)}</span>
              </div>
              <div style={{height:6,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct(v,1089000)}%`,background:'linear-gradient(90deg,#0369a1,#0ea5e9)',borderRadius:99}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* CRM por segmento */}
      <div className="panel-card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🏢 CRM Pipeline por Segmento</div>
        {Object.entries(bySeg).sort((a,b)=>b[1].pip-a[1].pip).map(([seg,{pip,n}])=>(
          <div key={seg} style={{marginBottom:10}}>
            <div className="flex justify-between items-center mb-1">
              <SegBadge s={seg}/>
              <span style={{fontSize:12,fontWeight:600,color:'#0f172a'}}>{fmt(pip)} <span style={{color:'#94a3b8',fontWeight:400}}>({n} opps)</span></span>
            </div>
            <div style={{height:5,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct(pip,totalT5)}%`,background:SEG_COLORS[seg]||'#64748b',borderRadius:99}}/>
            </div>
          </div>
        ))}
        <div style={{marginTop:12,padding:'10px 12px',background:'#fef9c3',borderRadius:8,fontSize:12,borderLeft:'3px solid #eab308'}}>
          <strong style={{color:'#854d0e'}}>Ganancia bruta total:</strong> <span style={{color:'#0f172a',fontWeight:700}}>{fmt(ganancia)}</span>
          <span style={{color:'#94a3b8'}}> · Margen promedio: ~18%</span>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════ */
/* APP ROOT                                                               */
/* ══════════════════════════════════════════════════════════════════════ */
function App(){
  const [section,setSection]=useState('cotizaciones');
  return(
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      <Header activeSection={section} setSection={setSection}/>
      <div style={{maxWidth:1300,margin:'0 auto',padding:'1.2rem 1rem'}}>
        {section==='cotizaciones'&&<SecCotizaciones/>}
        {section==='crm'&&<SecCRM/>}
        {section==='cisco'&&<SecCisco/>}
        {section==='kpis'&&<SecKPIs/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
